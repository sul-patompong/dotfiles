after-login-command = []

after-startup-command = []

exec-on-workspace-change = [
    '/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE; sketchybar --trigger aerospace_fullscreen_change',
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_fullscreen_change']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.bottom = 12
outer.top = 48
outer.right = 12

# ── Main mode ──────────────────────────────────────────────────────────────────
[mode.main.binding]

# Apps
cmd-alt-ctrl-t = 'exec-and-forget open -a /Applications/Ghostty.app'

# Layout
cmd-alt-ctrl-slash = 'layout tiles horizontal vertical'
cmd-alt-ctrl-comma = 'layout accordion horizontal vertical'
cmd-alt-ctrl-f = ['fullscreen', 'exec-and-forget sketchybar --trigger aerospace_fullscreen_change']

# Focus
cmd-alt-ctrl-h = 'focus left'
cmd-alt-ctrl-j = 'focus down'
cmd-alt-ctrl-k = 'focus up'
cmd-alt-ctrl-l = 'focus right'

# Move
cmd-alt-ctrl-shift-h = 'move left'
cmd-alt-ctrl-shift-j = 'move down'
cmd-alt-ctrl-shift-k = 'move up'
cmd-alt-ctrl-shift-l = 'move right'

# Resize
cmd-alt-ctrl-minus = 'resize smart -50'
cmd-alt-ctrl-equal = 'resize smart +50'

# Workspaces
cmd-alt-ctrl-u = 'workspace u'
cmd-alt-ctrl-i = 'workspace i'
cmd-alt-ctrl-o = 'workspace o'
cmd-alt-ctrl-p = 'workspace p'
cmd-alt-ctrl-7 = 'workspace 7'
cmd-alt-ctrl-8 = 'workspace 8'
cmd-alt-ctrl-9 = 'workspace 9'
cmd-alt-ctrl-0 = 'workspace 0'

# Move window to workspace
# cmd-alt-ctrl-shift-u = 'move-node-to-workspace u'
# cmd-alt-ctrl-shift-i = 'move-node-to-workspace i'
# cmd-alt-ctrl-shift-o = 'move-node-to-workspace o'
# cmd-alt-ctrl-shift-p = 'move-node-to-workspace p'
# cmd-alt-ctrl-shift-7 = 'move-node-to-workspace 7'
# cmd-alt-ctrl-shift-8 = 'move-node-to-workspace 8'
# cmd-alt-ctrl-shift-9 = 'move-node-to-workspace 9'
# cmd-alt-ctrl-shift-0 = 'move-node-to-workspace 0'

# Monitor
cmd-alt-ctrl-tab = 'workspace-back-and-forth'
cmd-alt-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Modes
cmd-alt-ctrl-shift-semicolon = ['mode service', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=service']
cmd-alt-ctrl-w = ['mode window', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=window']

# ── Service mode ───────────────────────────────────────────────────────────────
[mode.service.binding]
esc = ['reload-config', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
r = ['flatten-workspace-tree', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
f = ['layout floating tiling', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
backspace = ['close-all-windows-but-current', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
cmd-alt-ctrl-shift-h = ['join-with left', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
cmd-alt-ctrl-shift-j = ['join-with down', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
cmd-alt-ctrl-shift-k = ['join-with up', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
cmd-alt-ctrl-shift-l = ['join-with right', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']

# ── Window mode ────────────────────────────────────────────────────────────────
[mode.window.binding]

# # Focus (exits mode — usually focus once then continue)
# h = ['focus left', 'mode main']
# j = ['focus down', 'mode main']
# k = ['focus up', 'mode main']
# l = ['focus right', 'mode main']

# Move (stays in mode — often repeated)
h = ['move left', 'mode window']
j = ['move down', 'mode window']
k = ['move up', 'mode window']
l = ['move right', 'mode window']

cmd-alt-ctrl-u = 'move-node-to-workspace u'
cmd-alt-ctrl-i = 'move-node-to-workspace i'
cmd-alt-ctrl-o = 'move-node-to-workspace o'
cmd-alt-ctrl-p = 'move-node-to-workspace p'
cmd-alt-ctrl-7 = 'move-node-to-workspace 7'
cmd-alt-ctrl-8 = 'move-node-to-workspace 8'
cmd-alt-ctrl-9 = 'move-node-to-workspace 9'
cmd-alt-ctrl-0 = 'move-node-to-workspace 0'

# Resize (stays in mode — often repeated)
minus = ['resize smart -50', 'mode window']
equal = ['resize smart +50', 'mode window']

# Layout
t = ['layout tiles horizontal vertical', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
a = ['layout accordion horizontal vertical', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
f = ['fullscreen', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'exec-and-forget sketchybar --trigger aerospace_fullscreen_change']

# Actions
q = ['close', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']
r = ['reload-config', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']

# Exit
esc = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main']

# ── Window rules ───────────────────────────────────────────────────────────────

# WS u — browser + productivity
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace u'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace u'

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace u'

[[on-window-detected]]
if.app-id = 'com.todoist.mac.Todoist'
run = 'move-node-to-workspace u'

# WS i — comms
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace i'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace i'

[[on-window-detected]]
if.app-id = 'jp.naver.line.mac'
run = 'move-node-to-workspace i'

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace i'

# WS o — terminal
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace o'

# WS p — design
[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = 'move-node-to-workspace p'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace p'

[[on-window-detected]]
if.app-id = 'com.TickTick.task.mac'
run = 'move-node-to-workspace p'

# WS 7 — dev tools
[[on-window-detected]]
if.app-id = 'com.postmanlabs.mac'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.axosoft.gitkraken'
run = 'move-node-to-workspace 7'

# WS 8 — browser (Edge)
[[on-window-detected]]
if.app-id = 'com.microsoft.edgemac'
run = 'move-node-to-workspace 8'

# WS 0 — VMs
[[on-window-detected]]
if.app-id = 'com.parallels.desktop.console'
run = 'move-node-to-workspace 0'

[[on-window-detected]]
if.app-id = 'com.parallels.vm'
run = 'move-node-to-workspace 0'

[[on-window-detected]]
if.app-id = 'com.parallels.desktop'
run = 'move-node-to-workspace 0'

[[on-window-detected]]
if.app-id = 'com.philandro.anydesk'
run = 'move-node-to-workspace 0'

# Floating
[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'net.pulsesecure.Pulse-Secure'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Home'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.AppStore'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'cc.ffitch.shottr'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.jkiss.dbeaver.core.product'
if.window-title-regex-substring = '(?i)(connect|connection|preferences|settings|properties|edit|create|driver|export|import|sql editor|error|warning|confirm)'
run = 'layout floating'
