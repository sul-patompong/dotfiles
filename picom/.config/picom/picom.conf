
# Backend
backend = "glx";
vsync = true;
glx-no-stencil = true;
use-damage = true;

# Shadows
# shadow = true;
# shadow-radius = 10;
# shadow-offset-x = -10;
# shadow-offset-y = -10;
# shadow-opacity = 0.5;
# no-dock-shadow = true;
# no-dnd-shadow = true;
# clear-shadow = true;

# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency / Opacity
inactive-opacity = 0.85;
active-opacity = 1.0;
frame-opacity = 0.85;
inactive-opacity-override = false;

# Blur
blur-method = "dual_kawase";
blur-strength = 5;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Corner radius
corner-radius = 6;

# Opacity rules
opacity-rule = [
  "85:class_g = 'WezTerm'",
  "90:class_g = 'Neovim'"
];

# Other settings
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-leader = true;
detect-transient = true;
detect-client-opacity = true;

# Window type settings
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.9; };
  dropdown_menu = { opacity = 0.9; };
};

